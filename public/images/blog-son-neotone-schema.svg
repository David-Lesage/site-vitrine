<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="system-ui, sans-serif">
  <rect width="1200" height="700" fill="#f4eee1"/>
  <!-- sol -->
  <line x1="80" y1="560" x2="1120" y2="560" stroke="#d8cbb2" stroke-width="3"/>

  <!-- ondes sonores venant de derrière (gauche) vers la tête -->
  <g fill="none" stroke="#c8792e" stroke-width="4" stroke-linecap="round" opacity="0.85">
    <path d="M360 250 A 150 150 0 0 1 360 470"/>
    <path d="M410 230 A 200 200 0 0 1 410 490" opacity="0.7"/>
    <path d="M460 210 A 250 250 0 0 1 460 510" opacity="0.5"/>
  </g>
  <!-- fleche du son -->
  <path d="M470 340 L 660 340" stroke="#c14a32" stroke-width="5" stroke-linecap="round"/>
  <path d="M660 340 l -22 -13 v 26 z" fill="#c14a32"/>
  <text x="470" y="322" fill="#c14a32" font-size="25" font-weight="700">Le son arrive de derrière</text>

  <!-- enceinte Bose S1 sur pied, derriere, au niveau de la tete -->
  <line x1="250" y1="330" x2="250" y2="560" stroke="#7a6b52" stroke-width="7"/>
  <line x1="205" y1="558" x2="295" y2="558" stroke="#7a6b52" stroke-width="7" stroke-linecap="round"/>
  <g transform="rotate(12 250 300)">
    <rect x="205" y="250" width="90" height="150" rx="12" fill="#2a2320"/>
    <circle cx="250" cy="300" r="30" fill="#3a3330" stroke="#c8792e" stroke-width="3"/>
    <circle cx="250" cy="360" r="14" fill="#3a3330" stroke="#5a5350" stroke-width="2"/>
  </g>
  <text x="250" y="620" fill="#2a2320" font-size="24" font-weight="700" text-anchor="middle">Enceinte derrière toi</text>
  <text x="250" y="650" fill="#6b5d47" font-size="20" text-anchor="middle">au niveau de la tête</text>

  <!-- joueur assis, vue de cote, face a droite -->
  <g>
    <!-- tabouret -->
    <rect x="740" y="470" width="120" height="16" rx="6" fill="#8a7860"/>
    <line x1="755" y1="486" x2="745" y2="558" stroke="#8a7860" stroke-width="7"/>
    <line x1="845" y1="486" x2="855" y2="558" stroke="#8a7860" stroke-width="7"/>
    <!-- corps -->
    <path d="M770 470 q 30 -70 55 -120" fill="none" stroke="#2a2320" stroke-width="26" stroke-linecap="round"/>
    <!-- tete au niveau de l'enceinte -->
    <circle cx="835" cy="300" r="34" fill="#2a2320"/>
    <!-- bras vers le handpan -->
    <path d="M812 360 q 40 20 70 30" fill="none" stroke="#2a2320" stroke-width="18" stroke-linecap="round"/>
    <!-- jambes -->
    <path d="M775 468 q 60 30 120 20" fill="none" stroke="#2a2320" stroke-width="22" stroke-linecap="round"/>
  </g>
  <text x="835" y="235" fill="#2a2320" font-size="24" font-weight="700" text-anchor="middle">Toi</text>

  <!-- handpan Neotone devant, sur les genoux -->
  <g transform="translate(905 380)">
    <ellipse cx="0" cy="0" rx="60" ry="26" fill="#1f2a44" stroke="#c8792e" stroke-width="3"/>
    <circle cx="0" cy="0" r="9" fill="#2f6bd8"/>
    <circle cx="-32" cy="-6" r="5" fill="#e0402b"/>
    <circle cx="32" cy="-6" r="5" fill="#4caf6d"/>
    <circle cx="-16" cy="9" r="5" fill="#f1c62f"/>
    <circle cx="16" cy="9" r="5" fill="#8a49b8"/>
  </g>
  <text x="905" y="440" fill="#6b5d47" font-size="20" font-weight="700" text-anchor="middle">Neotone</text>

  <!-- titre -->
  <text x="600" y="70" fill="#2a2320" font-size="34" font-weight="800" text-anchor="middle">Place l’enceinte derrière toi, à hauteur de tête</text>
  <text x="600" y="108" fill="#6b5d47" font-size="22" text-anchor="middle">tu sens le son arriver de l’arrière — tu es « dans » le son</text>
</svg>
