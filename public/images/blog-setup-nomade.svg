<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="system-ui, sans-serif">
  <rect width="1200" height="700" fill="#f4eee1"/>
  <text x="600" y="72" fill="#2a2320" font-size="36" font-weight="800" text-anchor="middle">Le combo nomade autonome</text>
  <text x="600" y="110" fill="#6b5d47" font-size="22" text-anchor="middle">Tout sur batterie — aucune prise de courant nécessaire</text>

  <!-- 1. Neotone -->
  <g transform="translate(230 300)">
    <ellipse cx="0" cy="0" rx="110" ry="52" fill="#1f2a44" stroke="#c8792e" stroke-width="4"/>
    <circle cx="0" cy="0" r="17" fill="#2f6bd8"/>
    <circle cx="-58" cy="-13" r="10" fill="#e0402b"/><circle cx="58" cy="-13" r="10" fill="#4caf6d"/>
    <circle cx="-30" cy="19" r="10" fill="#f1c62f"/><circle cx="30" cy="19" r="10" fill="#8a49b8"/>
    <circle cx="0" cy="-30" r="10" fill="#ef8a2a"/>
  </g>
  <text x="230" y="400" fill="#2a2320" font-size="26" font-weight="700" text-anchor="middle">Neotone</text>
  <text x="230" y="430" fill="#6b5d47" font-size="19" text-anchor="middle">toutes les gammes · ~8 h</text>

  <!-- + -->
  <text x="420" y="315" fill="#c8792e" font-size="52" font-weight="800" text-anchor="middle">+</text>

  <!-- 2. Enceinte S1 Pro+ sur pied -->
  <g transform="translate(600 0)">
    <line x1="0" y1="330" x2="0" y2="470" stroke="#7a6b52" stroke-width="8"/>
    <line x1="-42" y1="468" x2="42" y2="468" stroke="#7a6b52" stroke-width="8" stroke-linecap="round"/>
    <g transform="rotate(10 0 270)">
      <rect x="-52" y="200" width="104" height="150" rx="14" fill="#2a2320"/>
      <circle cx="0" cy="252" r="32" fill="#3a3330" stroke="#c8792e" stroke-width="3"/>
      <circle cx="0" cy="316" r="15" fill="#3a3330" stroke="#5a5350" stroke-width="2"/>
    </g>
  </g>
  <text x="600" y="510" fill="#2a2320" font-size="26" font-weight="700" text-anchor="middle">Bose S1 Pro+</text>
  <text x="600" y="540" fill="#6b5d47" font-size="19" text-anchor="middle">sur batterie · derrière toi</text>

  <!-- + -->
  <text x="790" y="315" fill="#c8792e" font-size="52" font-weight="800" text-anchor="middle">+</text>

  <!-- 3. Cable jack -->
  <g transform="translate(960 290)">
    <path d="M-70 0 q 35 -45 70 0 q 35 45 70 0" fill="none" stroke="#2a2320" stroke-width="9" stroke-linecap="round"/>
    <rect x="-88" y="-9" width="20" height="18" rx="4" fill="#7a6b52"/>
    <rect x="68" y="-9" width="20" height="18" rx="4" fill="#7a6b52"/>
  </g>
  <text x="960" y="400" fill="#2a2320" font-size="26" font-weight="700" text-anchor="middle">1 câble jack</text>
  <text x="960" y="430" fill="#6b5d47" font-size="19" text-anchor="middle">et c’est tout</text>

  <!-- bandeau bas -->
  <rect x="120" y="592" width="960" height="62" rx="16" fill="#c8792e" fill-opacity="0.12" stroke="#c8792e" stroke-width="2"/>
  <text x="600" y="631" fill="#8a5216" font-size="23" font-weight="700" text-anchor="middle">Installé en une minute · jouable partout : plage, forêt, terrasse, scène</text>
</svg>
